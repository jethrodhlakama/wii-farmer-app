name: Build WII APK
on:
  push:
    branches: [main, master]
  workflow_dispatch:
jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Install dependencies
        run: npm install
      - name: Install TypeScript
        run: npm install -D typescript
      - name: Add Android platform
        run: npx cap add android
      - name: Sync web assets
        run: npx cap sync android
      - name: Enable cleartext & mixed content for Maps API
        run: |
          sed -i 's/android:usesCleartextTraffic="false"/android:usesCleartextTraffic="true"/' android/app/src/main/AndroidManifest.xml || true
          grep -q 'usesCleartextTraffic' android/app/src/main/AndroidManifest.xml || sed -i 's/<application/<application android:usesCleartextTraffic="true"/' android/app/src/main/AndroidManifest.xml
      - name: Add INTERNET permission
        run: |
          grep -q 'INTERNET' android/app/src/main/AndroidManifest.xml || sed -i 's/<application/\<uses-permission android:name="android.permission.INTERNET"\/>\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"\/>\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"\/>\n    <application/' android/app/src/main/AndroidManifest.xml
      - name: Build APK
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WII-Farmer-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
